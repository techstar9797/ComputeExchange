[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "compute-exchange-types"
version = "0.1.0"
description = "Shared type definitions for ComputeExchange"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "mypy>=1.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["."]
